<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지도 장소 스크랩</title>
    <style>
        body {
            width: 300px;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .header h1 {
            font-size: 18px;
            color: #03c75a;
            margin: 0;
        }
        
        .header p {
            font-size: 12px;
            color: #666;
            margin: 5px 0 0 0;
        }
        
        .info-section {
            background-color: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        
        .info-section h3 {
            font-size: 14px;
            margin: 0 0 8px 0;
            color: #333;
        }
        
        .info-section p {
            font-size: 12px;
            color: #666;
            margin: 0;
            line-height: 1.4;
        }
        
        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        
        .stat-item {
            text-align: center;
            flex: 1;
        }
        
        .stat-number {
            font-size: 20px;
            font-weight: bold;
            color: #03c75a;
        }
        
        .stat-label {
            font-size: 11px;
            color: #666;
        }
        
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .export-import-section {
            display: flex;
            gap: 5px;
        }
        
        .export-import-section .action-btn {
            flex: 1;
            font-size: 12px;
            padding: 10px 8px;
        }
        
        .action-btn {
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            text-align: center;
            transition: background-color 0.2s;
        }
        
        .primary-btn {
            background-color: #03c75a;
            color: white;
        }
        
        .primary-btn:hover {
            background-color: #02b351;
        }
        
        .secondary-btn {
            background-color: #f0f0f0;
            color: #333;
        }
        
        .secondary-btn:hover {
            background-color: #e0e0e0;
        }
        
        .version {
            text-align: center;
            font-size: 10px;
            color: #999;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>지도 장소 스크랩</h1>
        <p>다양한 지도 서비스에서 장소를 간편하게 저장하고 관리하세요</p>
    </div>
    
    <div class="stats">
        <div class="stat-item">
            <div class="stat-number" id="list-count">0</div>
            <div class="stat-label">목록 개수</div>
        </div>
        <div class="stat-item">
            <div class="stat-number" id="place-count">0</div>
            <div class="stat-label">저장된 장소</div>
        </div>
    </div>
    
    <div class="info-section">
        <h3>사용 방법</h3>
        <p>1. 지도 서비스에서 장소를 클릭하세요<br>
        2. 우측 사이드바의 '현재 보고 있는 장소 추가' 버튼을 클릭하세요<br>
        3. 저장된 장소를 목록에서 확인하세요</p>
    </div>
    
    <div class="action-buttons">
        <button class="action-btn primary-btn" id="open-naver-map">네이버지도 열기</button>
        <div class="export-import-section">
            <button class="action-btn secondary-btn" id="export-data">데이터 내보내기</button>
            <button class="action-btn secondary-btn" id="import-data">데이터 가져오기</button>
        </div>
        <button class="action-btn secondary-btn" id="clear-data">모든 데이터 삭제</button>
    </div>
    
    <!-- 내보내기 형식 선택 모달 -->
    <div id="export-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000;">
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 8px; width: 260px;">
            <h3 style="margin: 0 0 15px 0; font-size: 16px;">내보내기 형식 선택</h3>
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <button class="action-btn primary-btn" id="export-json">JSON 파일로 내보내기</button>
                <button class="action-btn secondary-btn" id="export-csv">CSV 파일로 내보내기</button>
                <button class="action-btn secondary-btn" id="cancel-export" style="margin-top: 10px;">취소</button>
            </div>
        </div>
    </div>
    
    <!-- 파일 입력 (숨김) -->
    <input type="file" id="file-input" accept=".json" style="display: none;">
    
    <div class="version">
        버전 1.0.0
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
